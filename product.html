<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<img class="logo" src="images/logo.png" alt="Logo">

<h1>Shree Shyam Rakhi</h1>

<a href="cart.html">
🛒 Cart <span id="cartCount">0</span>
</a>

</header>

<div class="product-detail">

<img id="productImage" alt="Product Image">

<div id="gallery" class="gallery"></div>

<h2 id="productName"></h2>

<h3 id="productPrice"></h3>

<p id="productDescription"></p>

<p><b>⭐ Rating:</b> <span id="productRating"></span></p>

<p><b>📦 Stock:</b> <span id="productStock"></span></p>

<p><b>🚚 Delivery:</b> <span id="productDelivery"></span></p>

<p><b>🎁 Material:</b> <span id="productMaterial"></span></p>

<button id="buyBtn">
🛒 Add To Cart
</button>
<div class="review-section">

<h2>⭐ Customer Reviews</h2>

<input type="text" id="reviewName" placeholder="Your Name">

<select id="reviewRating">
<option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐</option>
<option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option>
<option value="⭐⭐⭐">⭐⭐⭐</option>
<option value="⭐⭐">⭐⭐</option>
<option value="⭐">⭐</option>
</select>

<textarea id="reviewText" placeholder="Write your review"></textarea>

<button onclick="addReview()">
Submit Review
</button>


<div id="reviews"></div>

</div>

</div>
<script type="module" src="script.js"></script>

 <script type="module">
<script type="module">
import { loadProductDetails, updateCartCount } from "./script.js";

loadProductDetails();
updateCartCount();
</script>
</script>     
    

</body>
</html>
