<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<img class="logo" src="logo.png" alt="Logo">

<h1>Shree Shyam Rakhi</h1>

<a href="cart.html">
🛒 Cart <span id="cartCount">0</span>
</a>

</header>



<button onclick="history.back()" style="
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin:15px 0 0 15px;
    padding:10px 20px;
    background:linear-gradient(135deg,#8B0000,#c40000);
    color:#fff;
    border:none;
    border-radius:30px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
">
⬅ Back to Products
</button>




<div class="product-detail">

<img id="productImage" alt="Product Image">

<div id="gallery" class="gallery"></div>

<h2 id="productName"></h2>

<h3 id="productPrice"></h3>

<p id="productDescription"></p>

<p><b>⭐ Rating:</b> <span id="productRating"></span></p>

<p><b>📦 Stock:</b> <span id="productStock"></span></p>

<p><b>🚚 Delivery:</b> <span id="productDelivery"></span></p>

<p><b>🎁 Material:</b> <span id="productMaterial"></span></p>

<button id="buyBtn">
🛒 Add To Cart
</button>

<button id="shareBtn" onclick="shareProductWhatsApp()">
📤 Share on WhatsApp
</button>

<button id="copyBtn" onclick="copyProductLink()">
📋 Copy Product Link
</button>

<hr>

<div class="review-section">

<h2>⭐ Customer Reviews</h2>

<input
type="text"
id="reviewName"
placeholder="Your Name">

<select id="reviewRating">
<option value="">Select Rating</option>
<option value="5">⭐⭐⭐⭐⭐ (5)</option>
<option value="4">⭐⭐⭐⭐ (4)</option>
<option value="3">⭐⭐⭐ (3)</option>
<option value="2">⭐⭐ (2)</option>
<option value="1">⭐ (1)</option>
</select>

<textarea
id="reviewText"
placeholder="Write your review"></textarea>

<div class="input-box">
    <label>📷 Add a Photo (optional)</label>
    <input type="file" id="reviewPhoto" accept="image/*">
</div>

<button onclick="submitReview()" id="submitReviewBtn">
Submit Review
</button>

<div id="reviews"></div>

</div>

</div>

<script type="module" src="script.js"></script>

<script type="module" src="review.js"></script>

<script type="module">

import {
loadProductDetails,
updateCartCount
} from "./script.js";

await loadProductDetails();

updateCartCount();

</script>

<div id="photoLightbox" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,.9);
    z-index:99999;
    justify-content:center;
    align-items:center;
    cursor:zoom-out;
">
    <img id="lightboxImg" src="" style="
        max-width:90%;
        max-height:90%;
        border-radius:10px;
        box-shadow:0 10px 40px rgba(0,0,0,.5);
    ">
    <span onclick="closeLightbox()" style="
        position:absolute;
        top:20px;
        right:30px;
        color:#fff;
        font-size:36px;
        cursor:pointer;
        font-weight:bold;
    ">&times;</span>
</div>

<script>
function openLightbox(src){
    const lightbox = document.getElementById("photoLightbox");
    document.getElementById("lightboxImg").src = src;
    lightbox.style.display = "flex";
}

function closeLightbox(){
    document.getElementById("photoLightbox").style.display = "none";
}

document.getElementById("photoLightbox").addEventListener("click", function(e){
    if(e.target.id === "photoLightbox"){
        closeLightbox();
    }
});
</script>



</body>

</html>
