<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shree Shyam Rakhi</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<img class="logo" src="logo.png" alt="Logo">

<h1>Shree Shyam Rakhi</h1>

<a href="cart.html">
🛒 Cart <span id="cartCount">0</span>
</a>

</header>

<section class="hero">
    <h2>Premium Rakhi Collection</h2>
    <p>Beautiful Rakhi for your loved ones.</p>
    <a href="#products" style="display:inline-block; margin-top:15px; padding:12px 30px; background:linear-gradient(135deg,#8B0000,#c40000); color:#fff; border-radius:30px; text-decoration:none; font-weight:bold;">
        Shop Now 🛍️
    </a>
</section>

<section class="search-section">

<input
type="text"
id="searchInput"
placeholder="🔍 Search Rakhi..."
onkeyup="searchProducts()"
>

</section>

<!-- SORT BY -->

<section class="sort-section">

<label for="sortSelect"><b>Sort By :</b></label>

<select id="sortSelect" onchange="sortProducts()">

<option value="default">Default</option>

<option value="priceLow">
💰 Price : Low → High
</option>

<option value="priceHigh">
💰 Price : High → Low
</option>

<option value="nameAZ">
🔤 Name : A → Z
</option>

<option value="nameZA">
🔤 Name : Z → A
</option>

<option value="newest">
🆕 Newest First
</option>

<option value="oldest">
📅 Oldest First
</option>

</select>

</section>


<!-- CATEGORY MENU -->

<section class="category-section">

<h2 class="category-title">✨ Shop By Category ✨</h2>

<div class="category-buttons">

<button onclick="filterProducts('all')" class="active">
🏠 All
</button>

<button onclick="filterProducts('designer')">
💎 Designer
</button>

<button onclick="filterProducts('traditional')">
🪔 Traditional
</button>

</div>

</section>

<!-- PRODUCTS WILL LOAD FROM FIREBASE -->

<section id="products">

</section>

<script type="module" src="script.js"></script>

<button id="scrollTopBtn" onclick="scrollToTop()">
⬆
</button>

<footer>

<h3>Contact Us</h3>

<p>
📧 Email:
<a href="mailto:shreeshyamrakhi2@gmail.com">
shreeshyamrakhi2@gmail.com
</a>
</p>

<p>
📸 Instagram:
<a href="https://instagram.com/yourusername" target="_blank">
@yourusername
</a>
</p>

<p>
© 2026 Shree Shyam Rakhi. All Rights Reserved.
</p>

</footer>

</body>
</html>
