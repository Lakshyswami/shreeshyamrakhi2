<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Your Cart | Shree Shyam Rakhi</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>
  

    <img src="images/logo.png" class="logo" alt="Logo">

    <h1>Shree Shyam Rakhi</h1>

    <a href="index.html">🏠 Home</a>

</header>

<section class="hero">

    <h2>Your Shopping Cart</h2>

    <p>Review your selected Rakhi products before placing your order.</p>

</section>

<div class="cart-container">

    <div id="cartItems">

    </div>

    <hr>

    <h2 id="totalPrice">
        Total Price : ₹0
    </h2>
<div class="customer-details">

<h2>📋 Delivery Details</h2>

<div class="input-box">

<label>👤 Name</label>
<input type="text" id="customerName" placeholder="Enter your name">

</div>


<div class="input-box">

<label>📱 Mobile Number</label>
<input type="tel" id="customerMobile" placeholder="Enter mobile number">

</div>


<div class="input-box">

<label>🏠 Address</label>
<textarea id="customerAddress" placeholder="Enter full delivery address"></textarea>

</div>
<button class="order-btn" onclick="orderWhatsApp()">
    📲 Order on WhatsApp
</button>
</div>

<script src="script.js"></script>
<button id="scrollTopBtn" onclick="scrollToTop()">
⬆
</button>
</body>

</html>
